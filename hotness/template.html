<!DOCTYPE html>
<html>
<head>
  <title>Hot Board Games</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <style>
    body {
      padding: 20px;
    }
    .boardgame-card {
      margin-bottom: 20px;
    }
    .boardgame-card .card-image img {
      height: 200px;
      object-fit: cover;
      transition: transform 0.3s ease-in-out;
    }
    .boardgame-card .card-image:hover img {
      transform: scale(1.1);
    }
    .boardgame-card .card-content {
      padding: 20px;
    }
    .boardgame-card .card-title {
      font-size: 16px;
      margin-bottom: 5px;
    }
    .boardgame-card .card-rating {
      font-size: 12px;
      color: #888;
    }
    .boardgame-card .card-authors {
      font-size: 14px;
      margin-top: 5px;
    }
    .boardgame-card .card-description {
      font-size: 14px;
      margin-top: 10px;
    }
    .boardgame-card .read-more {
      font-size: 12px;
      color: #00bcd4;
      cursor: pointer;
    }
    .boardgame-card .show-less {
      font-size: 12px;
      color: #00bcd4;
      cursor: pointer;
    }
   </style>
</head>
<body>
  <div class="row">
    <div class="col s12">
      <div class="card header-card blue-grey darken-1 white-text">
        <div class="card-content">
          <h1>Hot Board Games {{ .Date }}</h1>
        </div>
      </div>
    </div>
  </div>

  <div class="row" id="boardgame-list"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script>
        const boardGames = [
        {{ range $val := .Things }}
      {
        thumbnail: '{{ $val.Image }}',
        title: '{{ $val.Name }}',
        rating: '{{ $val.BayesAverage }}',
        designers: 'Designer 1, Designer 2',
        authors: 'Author 1, Author 2',
        description: '{{ $val.Description }}',
        link: 'https://boardgamegeek.com/boardgame/{{ $val.ID }}/'
      },
      {{ end }}
    ];


    const boardgameListElement = document.getElementById('boardgame-list');

    boardGames.forEach(boardgame => {
      const listItem = document.createElement('div');
      listItem.classList.add('col', 's12', 'm6', 'l3');

      const card = document.createElement('div');
      card.classList.add('card', 'boardgame-card');

      const cardImage = document.createElement('div');
      cardImage.classList.add('card-image');
      const thumbnail = document.createElement('img');
      thumbnail.src = boardgame.thumbnail;
      cardImage.appendChild(thumbnail);
      card.appendChild(cardImage);

      const cardContent = document.createElement('div');
      cardContent.classList.add('card-content');
      const title = document.createElement('span');
      title.classList.add('card-title');
      title.textContent = boardgame.title;
      const rating = document.createElement('span');
      rating.classList.add('card-rating');
      rating.textContent = `(${boardgame.rating})`;
      const description = document.createElement('p');
      description.classList.add('card-description');
      const descriptionText = boardgame.description.length > 100 ? boardgame.description.substring(0, 100) + '...' : boardgame.description;
      description.textContent = descriptionText;
      cardContent.appendChild(title);
      cardContent.appendChild(rating);
      cardContent.appendChild(description);
      card.appendChild(cardContent);

      const cardAction = document.createElement('div');
      cardAction.classList.add('card-action');
      const authorInfo = document.createElement('p');
      authorInfo.classList.add('card-authors');
      authorInfo.innerHTML = `<span>Designers: ${boardgame.designers}</span><br><span>Authors: ${boardgame.authors}</span>`;
      const link = document.createElement('a');
      link.href = boardgame.link;
      link.textContent = 'View Details';
      cardAction.appendChild(authorInfo);
      cardAction.appendChild(link);
      card.appendChild(cardAction);

      if (boardgame.description.length > 100) {
        const readMoreLink = document.createElement('span');
        readMoreLink.classList.add('read-more');
        readMoreLink.textContent = 'Read More';
        description.appendChild(readMoreLink);

        readMoreLink.addEventListener('click', () => {
          if (readMoreLink.textContent === 'Read More') {
            description.textContent = boardgame.description;
            readMoreLink.textContent = 'Show Less';
          } else {
            description.textContent = descriptionText;
            readMoreLink.textContent = 'Read More';
          }
        });
      }

      listItem.appendChild(card);
      boardgameListElement.appendChild(listItem);
    });
  </script>
</body>
</html>
